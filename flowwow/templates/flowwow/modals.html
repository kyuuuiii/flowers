<div class="modal" id="cartModal">
    <div class="modal__content">
        <button class="modal__close" id="cartModalClose"><i class="fas fa-times"></i></button>
        <h2 class="modal__title">Корзина</h2>
        <div class="cart-items" id="cartItems"></div>
        <div class="cart-total"><span>Итого:</span><span id="cartTotal">0 ₽</span></div>
        <button class="btn btn--primary btn--full" id="checkoutBtn">Оформить заказ</button>
    </div>
</div>

<div class="modal" id="authModal">
    <div class="modal__content">
        <button class="modal__close" id="authModalClose"><i class="fas fa-times"></i></button>
        <div class="auth-tabs">
            <button class="auth-tab active" data-tab="login">Вход</button>
            <button class="auth-tab" data-tab="register">Регистрация</button>
        </div>
        <form id="loginForm" class="auth-form active">
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Пароль" required>
            <button type="submit" class="btn btn--primary btn--full">Войти</button>
        </form>
        <form id="registerForm" class="auth-form">
            <input type="text" placeholder="Имя" required>
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Пароль" required>
            <input type="password" placeholder="Подтвердите пароль" required>
            <button type="submit" class="btn btn--primary btn--full">Зарегистрироваться</button>
        </form>
    </div>
</div>

<div class="modal" id="profileModal">
    <div class="modal__content modal__content--large">
        <button class="modal__close" id="profileModalClose"><i class="fas fa-times"></i></button>
        <div id="profileContent"></div>
    </div>
</div>

<div class="modal" id="productModal">
    <div class="modal__content modal__content--large">
        <button class="modal__close" id="productModalClose"><i class="fas fa-times"></i></button>
        <div class="product-detail" id="productDetail"></div>
    </div>
</div>

<div class="modal" id="addProductModal">
    <div class="modal__content">
        <button class="modal__close" id="addProductModalClose"><i class="fas fa-times"></i></button>
        <h2 class="modal__title" id="addProductTitle">Добавить товар</h2>
        <form id="addProductForm">
            <input type="text" id="productName" placeholder="Название букета" required>
            <input type="text" id="productComposition" placeholder="Состав (розы, пионы...)" required>
            <input type="number" id="productPrice" placeholder="Цена" required>
            <input type="text" id="productImage" placeholder="URL изображения" required>
            <select id="productCategory" required>
                <option value="romantic">Романтические</option>
                <option value="wedding">Свадебные</option>
                <option value="birthday">День рождения</option>
                <option value="business">Деловые</option>
                <option value="spring">Весенние</option>
                <option value="luxury">Премиум</option>
            </select>
            <textarea id="productDescription" placeholder="Описание букета" rows="3" required></textarea>
            <button type="submit" class="btn btn--primary btn--full">Сохранить</button>
        </form>
    </div>
</div>

<div class="modal" id="addArticleModal">
    <div class="modal__content">
        <button class="modal__close" id="addArticleModalClose"><i class="fas fa-times"></i></button>
        <h2 class="modal__title">Добавить статью</h2>
        <form id="addArticleForm">
            <input type="text" id="articleTitle" placeholder="Заголовок статьи" required>
            <textarea id="articleExcerpt" placeholder="Краткое описание" rows="2" required></textarea>
            <input type="text" id="articleImage" placeholder="URL изображения" required>
            <select id="articleCategory" required>
                <option value="Уход за цветами">Уход за цветами</option>
                <option value="Советы">Советы</option>
                <option value="Новости">Новости</option>
                <option value="Свадьба">Свадьба</option>
                <option value="Растения">Растения</option>
                <option value="Мастер-класс">Мастер-класс</option>
            </select>
            <textarea id="articleContent" placeholder="Полный текст статьи" rows="5" required></textarea>
            <button type="submit" class="btn btn--primary btn--full">Сохранить</button>
        </form>
    </div>
</div>
