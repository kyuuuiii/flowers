{% extends 'flowwow/layout.html' %}
{% block title %}Оформление заказа - Flowwow{% endblock %}
{% block content %}

    <main>
        <section class="order-form-section">
            <div class="container">
                <h1 class="section-title">Оформление заказа</h1>
                <form id="orderForm" class="order-form">
                    <div class="form-group"><label>Ваше имя</label><input type="text" id="orderName" required></div>
                    <div class="form-group"><label>Телефон</label><input type="tel" id="orderPhone" required></div>
                    <div class="form-group"><label>Email</label><input type="email" id="orderEmail" required></div>
                    <div class="form-group"><label>Адрес доставки</label><input type="text" id="orderAddress" required></div>
                    <div class="form-group"><label>Дата доставки</label><input type="date" id="orderDate" required></div>
                    <div class="form-group"><label>Время доставки</label><select id="orderTime"><option>9:00 - 12:00</option><option>12:00 - 15:00</option><option>15:00 - 18:00</option><option>18:00 - 21:00</option></select></div>
                    <div class="form-group"><label>Комментарий к заказу</label><textarea id="orderComment" rows="3"></textarea></div>
                    <div class="order-summary" id="orderSummary"></div>
                    <button type="submit" class="btn btn--primary btn--full">Подтвердить заказ</button>
                </form>
            </div>
        </section>
    </main>

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('orderForm');
    if (!form) return;

    // 1. Grab CSRF token
    function getCookie(name) {
        let v = null;
        if (document.cookie) {
            const c = document.cookie.split(';');
            for(let i=0; i<c.length; i++) {
                const k = c[i].trim();
                if(k.indexOf(name+'=')===0) v = decodeURIComponent(k.substring(name.length+1));
            }
        }
        return v;
    }
    const csrf = getCookie('csrftoken');
    const cart = JSON.parse(localStorage.getItem('cart') || '[]');

    // 2. Show cart summary
    const summary = document.getElementById('orderSummary');
    if (summary) {
        const total = cart.reduce((s, i) => s + (i.price * i.quantity), 0);
        summary.innerHTML = `<h4>Ваш заказ</h4>${cart.map(i => `<p>${i.name} x ${i.quantity} - ${i.price * i.quantity} ₽</p>`).join('')}<p><strong>Итого: ${total} ₽</strong></p>`;
    }

    // 3. Handle Submit (100% isolated from main.js)
    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        e.stopImmediatePropagation(); // KILLS other scripts from hijacking
        if (!form.checkValidity()) { form.reportValidity(); return; }

        const btn = form.querySelector('button[type="submit"]');
        btn.disabled = true; btn.textContent = 'Отправляем...';

        const payload = {
            cart_items: cart,
            phone: document.getElementById('orderPhone').value.trim(),
            email: document.getElementById('orderEmail').value.trim(),
            address: document.getElementById('orderAddress').value.trim(),
            date: document.getElementById('orderDate').value,
            time: document.getElementById('orderTime').value,
            comment: document.getElementById('orderComment').value.trim()
        };

        if (cart.length === 0) { alert('❌ Корзина пуста'); btn.disabled = false; btn.textContent = 'Подтвердить заказ'; return; }

        try {
            const res = await fetch('/order/submit/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'X-CSRFToken': csrf},
                body: JSON.stringify(payload)
            });
            const d = await res.json();

            if (res.ok) {
                localStorage.removeItem('cart');
                alert('✅ Заказ успешно оформлен! Спасибо за покупку.');
                window.location.href = '/catalog/';
            } else {
                alert('❌ ' + (d.error || 'Ошибка оформления'));
                btn.disabled = false; btn.textContent = 'Подтвердить заказ';
            }
        } catch (err) {
            console.error('Order fetch failed:', err);
            alert('❌ Ошибка сети. Проверьте консоль (F12)');
            btn.disabled = false; btn.textContent = 'Подтвердить заказ';
        }
    });
});
</script>
{% endblock %}
{% endblock %}
