<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оформление заказа - Flowwow</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="container header__container">
            <a href="index.html" class="logo"><i class="fas fa-feather-alt"></i><span>Flowwow</span></a>
            <nav class="nav">
                <ul class="nav__list">
                    <li><a href="index.html" class="nav__link">Главная</a></li>
                    <li><a href="catalog.html" class="nav__link">Каталог</a></li>
                    <li><a href="about.html" class="nav__link">О нас</a></li>
                    <li><a href="articles.html" class="nav__link">Статьи</a></li>
                </ul>
            </nav>
            <div class="header__actions">
                <button class="header__btn header__search-btn" aria-label="Поиск"><i class="fas fa-search"></i></button>
                <button class="header__btn header__cart-btn" id="cartBtn" aria-label="Корзина"><i class="fas fa-shopping-bag"></i><span class="cart-count" id="cartCount">0</span></button>
                <button class="header__btn header__user-btn" id="userBtn" aria-label="Войти"><i class="fas fa-user"></i></button>
                <button class="header__hamburger" id="hamburgerBtn" aria-label="Меню"><i class="fas fa-bars"></i></button>
            </div>
        </div>
        <div class="search-bar" id="searchBar">
            <div class="container">
                <div class="search-bar__wrapper">
                    <i class="fas fa-search search-bar__icon"></i>
                    <input type="text" id="searchInput" placeholder="Поиск по названию или составу букета..." class="search-bar__input">
                    <button class="search-bar__close" id="closeSearchBtn"><i class="fas fa-times"></i></button>
                </div>
            </div>
        </div>
    </header>

    <main>
        <section class="order-form-section">
            <div class="container">
                <h1 class="section-title">Оформление заказа</h1>
                <form id="orderForm" class="order-form">
                    <div class="form-group"><label>Ваше имя</label><input type="text" id="orderName" required></div>
                    <div class="form-group"><label>Телефон</label><input type="tel" id="orderPhone" required></div>
                    <div class="form-group"><label>Email</label><input type="email" id="orderEmail" required></div>
                    <div class="form-group"><label>Адрес доставки</label><input type="text" id="orderAddress" required></div>
                    <div class="form-group"><label>Дата доставки</label><input type="date" id="orderDate" required></div>
                    <div class="form-group"><label>Время доставки</label><select id="orderTime"><option>9:00 - 12:00</option><option>12:00 - 15:00</option><option>15:00 - 18:00</option><option>18:00 - 21:00</option></select></div>
                    <div class="form-group"><label>Комментарий к заказу</label><textarea id="orderComment" rows="3"></textarea></div>
                    <div class="order-summary" id="orderSummary"></div>
                    <button type="submit" class="btn btn--primary btn--full">Подтвердить заказ</button>
                </form>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer__grid">
                <div class="footer__col"><a href="index.html" class="footer__logo"><i class="fas fa-feather-alt"></i><span>Flowwow</span></a><p class="footer__text">Цветочная мастерская с душой.</p></div>
                <div class="footer__col"><h3 class="footer__title">Навигация</h3><ul class="footer__links"><li><a href="index.html">Главная</a></li><li><a href="catalog.html">Каталог</a></li><li><a href="about.html">О нас</a></li><li><a href="articles.html">Статьи</a></li></ul></div>
                <div class="footer__col"><h3 class="footer__title">Контакты</h3><ul class="footer__links"><li><i class="fas fa-phone"></i> 8-863-765-38-90</li><li><i class="fas fa-envelope"></i> info@flowwow.ru</li></ul></div>
                <div class="footer__col"><h3 class="footer__title">Мы в соцсетях</h3><div class="footer__social"><a href="#"><i class="fab fa-instagram"></i></a><a href="#"><i class="fab fa-vk"></i></a><a href="#"><i class="fab fa-telegram"></i></a></div></div>
            </div>
            <div class="footer__bottom"><p>© 2026 Flowwow. Все права защищены.</p></div>
        </div>
    </footer>

    <div class="modal" id="cartModal"><div class="modal__content"><button class="modal__close" id="cartModalClose"><i class="fas fa-times"></i></button><h2 class="modal__title">Корзина</h2><div class="cart-items" id="cartItems"></div><div class="cart-total"><span>Итого:</span><span id="cartTotal">0 ₽</span></div><button class="btn btn--primary btn--full" id="checkoutBtn">Оформить заказ</button></div></div>
    <div class="modal" id="authModal"><div class="modal__content"><button class="modal__close" id="authModalClose"><i class="fas fa-times"></i></button><div class="auth-tabs"><button class="auth-tab active" data-tab="login">Вход</button><button class="auth-tab" data-tab="register">Регистрация</button></div><form id="loginForm" class="auth-form active"><input type="email" placeholder="Email" required><input type="password" placeholder="Пароль" required><button type="submit" class="btn btn--primary btn--full">Войти</button></form><form id="registerForm" class="auth-form"><input type="text" placeholder="Имя" required><input type="email" placeholder="Email" required><input type="password" placeholder="Пароль" required><input type="password" placeholder="Подтвердите пароль" required><button type="submit" class="btn btn--primary btn--full">Зарегистрироваться</button></form></div></div>
    <div class="modal" id="profileModal"><div class="modal__content modal__content--large"><button class="modal__close" id="profileModalClose"><i class="fas fa-times"></i></button><div id="profileContent"></div></div></div>

    <script src="js/data.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
